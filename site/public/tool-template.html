<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TOOL_NAME}} - 海外实用工具推荐站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .prose h2 { margin-top: 2rem; margin-bottom: 1rem; font-size: 1.5rem; font-weight: bold; }
    .prose h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; font-size: 1.25rem; font-weight: bold; }
    .prose ul { margin-left: 1.5rem; margin-bottom: 1rem; }
    .prose li { margin-bottom: 0.5rem; }
    .prose a { color: #2563eb; text-decoration: underline; }
    .prose code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.875rem; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app">
    <!-- Header -->
    <header class="bg-white shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <a href="/" class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-bold text-xl">T</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">工具推荐站</h1>
            <p class="text-sm text-gray-500">发现海外优质工具</p>
          </div>
        </a>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <article class="bg-white rounded-xl shadow-sm p-8">
        <div class="mb-8">
          <div class="flex items-center space-x-4 mb-4">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
              <span class="text-white font-bold text-2xl">{{TOOL_INITIAL}}</span>
            </div>
            <div>
              <h1 class="text-3xl font-bold text-gray-900">{{TOOL_NAME}}</h1>
              <p class="text-lg text-gray-600 mt-1">{{TOOL_TAGLINE}}</p>
            </div>
          </div>
          
          <div class="flex flex-wrap gap-2 mb-6">
            {{TOOL_TAGS}}
          </div>
          
          <div class="flex items-center space-x-4 text-sm text-gray-500">
            <span>📅 {{TOOL_DATE}}</span>
            <span>📍 来源：{{TOOL_SOURCE}}</span>
          </div>
        </div>
        
        <div class="prose max-w-none">
          {{TOOL_CONTENT}}
        </div>
        
        <div class="mt-8 pt-8 border-t border-gray-200">
          <a href="/" class="text-blue-600 hover:text-blue-700 font-medium">
            ← 返回工具列表
          </a>
        </div>
      </article>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-16">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <p class="text-center text-gray-500 text-sm">
          © 2026 海外实用工具推荐站 · 由 OpenWork 自动生成
        </p>
      </div>
    </footer>
  </div>
</body>
</html>
